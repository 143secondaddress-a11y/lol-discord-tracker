name: LoL Match Tracker

on:
  # 5分おきに自動実行（GitHub Actions の最短間隔）
  schedule:
    - cron: "*/5 * * * *"
  # 手動実行も可能
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # last_match_id.txt をコミットして保存するため

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 最新のコミット（last_match_id.txt を含む）を取得
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          RIOT_API_KEY:    ${{ secrets.RIOT_API_KEY }}
          GAME_NAME:       ${{ secrets.GAME_NAME }}
          TAG_LINE:        ${{ secrets.TAG_LINE }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python tracker.py

      - name: Save data
        # last_match_id.txt と stats/*.json が変わった場合のみコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_match_id.txt stats/
          git diff --cached --quiet || git commit -m "chore: update match data [skip ci]"
          git push
